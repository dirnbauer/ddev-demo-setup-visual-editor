base: 'https://ddev-demo-setup-visual-editor.ddev.site'
baseVariants:
  -
    base: 'https://ddev-demo-setup-visual-editor.ddev.site:33001'
    condition: 'getenv("DDEV_PRIMARY_URL") != ""'
dependencies:
  - typo3/theme-camino
languages:
  -
    title: English
    enabled: true
    languageId: 0
    base: /
