base: 'https://ddev-demo-setup-visual-editor.ddev.site/typo3-vienna-camp-2026/'
dependencies:
  - webconsulting/desiderio-preset-corporate
  - marekskopal/typo3-mcp-docs
  - dirnbauer/adminpanel-defaults
  - dirnbauer/solr-defaults
languages:
  -
    languageId: 0
    title: English
    navigationTitle: English
    locale: en_US.UTF-8
    base: /
    flag: us
    iso-639-1: en
    fallbackType: strict
    solr_core_read: core_en
  -
    languageId: 1
    title: German
    navigationTitle: Deutsch
    locale: de_AT.UTF-8
    base: /de/
    flag: de
    iso-639-1: de
    fallbackType: fallback
    solr_core_read: core_de
  -
    languageId: 2
    title: 'Chinese (Simplified)'
    navigationTitle: 中文
    locale: zh_CN.UTF-8
    base: /zh/
    flag: cn
    iso-639-1: zh
    fallbackType: fallback
    solr_core_read: core_zh
  -
    languageId: 3
    title: Hungarian
    navigationTitle: Magyar
    locale: hu_HU.UTF-8
    base: /hu/
    flag: hu
    iso-639-1: hu
    fallbackType: fallback
    solr_core_read: core_hu
rootPageId: 505
solr_enabled_read: true
solr_host_read: typo3-solr
solr_path_read: /
solr_port_read: 8983
solr_scheme_read: http
solr_use_write_connection: false
