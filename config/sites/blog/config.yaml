base: 'https://ddev-demo-setup-visual-editor.ddev.site/autogenerated-15'
contentSecurityPolicies: {  }
dependencies:
  - blog/standalone
  - georgringer/news
errorHandling: {  }
languages:
  -
    title: German
    languageId: 0
    base: /
    locale: de_DE.UTF-8
    navigationTitle: Deutsch
    flag: de
    iso-639-1: de
    fallbackType: strict
  -
    title: English
    enabled: true
    languageId: 1
    base: /en/
    locale: en_US.UTF-8
    navigationTitle: English
    flag: us
    iso-639-1: en
    fallbackType: fallback
  -
    title: Chinese
    enabled: true
    languageId: 2
    base: /zh/
    locale: zh_CN.UTF-8
    navigationTitle: 中文
    flag: cn
    iso-639-1: zh
    fallbackType: fallback
rootPageId: 15
routeEnhancers:
  News:
    type: Extbase
    extension: News
    plugin: Pi1
    routes:
      -
        routePath: /
        _controller: 'News::list'
      -
        routePath: '/page-{page}'
        _controller: 'News::list'
        _arguments:
          page: currentPage
      -
        routePath: '/category/{category-name}/page-{page}'
        _controller: 'News::list'
        _arguments:
          category-name: overwriteDemand/categories
          page: currentPage
      -
        routePath: '/category/{category-name}'
        _controller: 'News::list'
        _arguments:
          category-name: overwriteDemand/categories
      -
        routePath: '/tag/{tag-name}/page-{page}'
        _controller: 'News::list'
        _arguments:
          tag-name: overwriteDemand/tags
          page: currentPage
      -
        routePath: '/tag/{tag-name}'
        _controller: 'News::list'
        _arguments:
          tag-name: overwriteDemand/tags
      -
        routePath: '/article/{news-title}'
        _controller: 'News::detail'
        _arguments:
          news-title: news
    defaultController: 'News::list'
    defaults:
      page: '0'
    aspects:
      news-title:
        type: NewsTitle
      page:
        type: StaticRangeMapper
        start: '1'
        end: '100'
      category-name:
        type: NewsCategory
      tag-name:
        type: NewsTag
routes: {  }
settings:
  news.pages.detail: 42
imports:
  -
    resource: 'EXT:blog/Configuration/Routes/Default.yaml'
