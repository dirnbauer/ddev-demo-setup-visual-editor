<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:page.meta property="viewport">width=device-width, initial-scale=1.0</f:page.meta>

<header class="mb-5 shadow-sm">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <f:link.page pageUid="{rootPage}" class="navbar-brand fw-bold fs-4">
                {siteTitle}
            </f:link.page>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <f:for each="{mainnavigation}" as="item">
                        <li class="nav-item{f:if(condition: item.active, then: ' active')}">
                            <a class="nav-link fs-5" href="{item.link}"><span>{item.title}</span></a>
                        </li>
                    </f:for>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main>
    <f:render section="Main" />
</main>

<footer class="bg-dark text-light mt-5 py-5">
    <f:if condition="{languagenavigation}">
        <div class="container mb-3">
            <ul class="nav justify-content-center">
                <f:for each="{languagenavigation}" as="item">
                    <li class="nav-item">
                        <f:if condition="{item.available}">
                            <f:then>
                                <a class="nav-link text-light{f:if(condition: item.active, then: ' fw-bold')}" href="{item.link}" hreflang="{item.hreflang}" title="{item.title}">
                                    <span>{item.navigationTitle}</span>
                                </a>
                            </f:then>
                            <f:else>
                                <span class="nav-link text-muted">
                                    <span>{item.navigationTitle}</span>
                                </span>
                            </f:else>
                        </f:if>
                    </li>
                </f:for>
            </ul>
        </div>
    </f:if>
    <f:if condition="{copyright}">
        <div class="container text-center text-secondary">
            <p class="mb-0">
                {copyright -> f:format.raw()}
            </p>
        </div>
    </f:if>
</footer>

</html>
