<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:page.meta property="viewport">width=device-width, initial-scale=1.0</f:page.meta>

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex">
                <div class="flex-shrink-0 flex items-center">
                    <f:link.page pageUid="{rootPage}" class="text-2xl font-extrabold text-indigo-600 hover:text-indigo-500">
                        {siteTitle}
                    </f:link.page>
                </div>
                <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                    <f:for each="{mainnavigation}" as="item">
                        <a href="{item.link}" class="inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {f:if(condition: item.active, then: 'border-indigo-500 text-gray-900', else: 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700')}">
                            {item.title}
                        </a>
                    </f:for>
                </div>
            </div>
        </div>
    </nav>
</header>

<main class="min-h-screen bg-gray-50 py-10">
    <f:render section="Main" />
</main>

<footer class="bg-white border-t border-gray-200 mt-auto py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <f:if condition="{languagenavigation}">
            <div class="flex justify-center space-x-6 md:order-2 mb-8">
                <f:for each="{languagenavigation}" as="item">
                    <f:if condition="{item.available}">
                        <f:then>
                            <a href="{item.link}" hreflang="{item.hreflang}" class="text-gray-400 hover:text-gray-500 {f:if(condition: item.active, then: 'font-bold text-gray-900')}">
                                {item.navigationTitle}
                            </a>
                        </f:then>
                        <f:else>
                            <span class="text-gray-300 cursor-not-allowed">
                                {item.navigationTitle}
                            </span>
                        </f:else>
                    </f:if>
                </f:for>
            </div>
        </f:if>
        <f:if condition="{copyright}">
            <div class="mt-8 md:mt-0 md:order-1 text-center">
                <p class="text-base text-gray-400">
                    {copyright -> f:format.raw()}
                </p>
            </div>
        </f:if>
    </div>
</footer>

</html>
